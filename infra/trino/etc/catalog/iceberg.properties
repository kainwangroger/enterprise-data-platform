connector.name=iceberg
iceberg.catalog.type=rest
# In a real environment, we'd point to Nessie or REST Catalog.
# For local bootstrap, we use a simple REST mock or JDBC. Let's use JDBC for simple metadata store in Postgres.
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/edp_metadata
iceberg.jdbc-catalog.connection-user=postgres
iceberg.jdbc-catalog.connection-password=postgrespassword
iceberg.jdbc-catalog.catalog-name=iceberg_catalog

# S3 compatible storage config pointing to MinIO
fs.hadops.enabled=false
hive.s3.aws-access-key=admin
hive.s3.aws-secret-key=supersecretpassword
hive.s3.endpoint=http://minio:9000
hive.s3.path-style-access=true
hive.s3.ssl.enabled=false
